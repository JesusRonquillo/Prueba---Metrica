name: CI - Backend & Frontend

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & build backend
        working-directory: ./backend/EventService
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: Run domain tests
        working-directory: ./backend
        run: |
          dotnet test EventPlatform.EventService.Domain.Tests/EventPlatform.EventService.Domain.Tests.csproj --configuration Release --no-build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Enable corepack
        run: corepack enable

      - name: Install frontend deps
        working-directory: ./frontend/event-platform-web
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./frontend/event-platform-web
        run: pnpm build

  docker-images:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: Build & push EventService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/EventService/Dockerfile
          push: true
          tags: ${{ env.ECR_EVENTSERVICE_IMAGE || 'eventservice-api:latest' }}

      - name: Build & push NotificationService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/NotificationService/Dockerfile
          push: true
          tags: ${{ env.ECR_NOTIFICATION_IMAGE || 'notificationservice-worker:latest' }}

      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/event-platform-web
          file: ./frontend/event-platform-web/Dockerfile
          push: true
          tags: ${{ env.ECR_FRONTEND_IMAGE || 'event-frontend:latest' }}

